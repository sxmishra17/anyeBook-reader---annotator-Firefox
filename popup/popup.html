<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      padding: 20px;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(145deg, #1a1a2e, #16213e);
      color: #e0e0e0;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .header img {
      width: 32px;
      height: 32px;
      border-radius: 6px;
    }
    .header h1 {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
    }
    .header p {
      font-size: 11px;
      color: #8892b0;
      margin-top: 2px;
    }
    .btn {
      width: 100%;
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-primary {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }
    .btn-primary:active {
      transform: translateY(0);
    }
    .formats {
      margin-top: 12px;
      text-align: center;
      font-size: 10px;
      color: #5a6484;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="../icons/icon-96.png" alt="icon">
    <div>
      <h1>eBook Annotator</h1>
      <p>Read & take notes</p>
    </div>
  </div>
  <button class="btn btn-primary" id="open-reader">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
      <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
    </svg>
    Open eBook
  </button>
  <div class="formats">PDF · EPUB · MOBI · AZW3 · DOCX</div>
  <script src="popup.js"></script>
</body>
</html>
